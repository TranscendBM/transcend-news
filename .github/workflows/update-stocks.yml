name: Update Stock Prices (Every 10 min)

on:
  schedule:
    # 台灣交易時段 09:00–14:00 (UTC+8) = UTC 01:00–06:00，週一至週五
    # 每 10 分鐘觸發一次（GitHub Actions 最小精度為 5 分鐘）
    - cron: '*/10 1-6 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: '手動觸發原因'
        required: false
        default: 'manual test'

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install firebase-admin requests feedparser

      - name: Update stock prices
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          FETCH_MODE: stocks_only
        run: |
          python scripts/fetch_news.py
