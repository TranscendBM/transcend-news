name: Update Stock Prices (Every 5 min)

on:
  # 定時排程已於 2026-07 移交 Cloud Functions（functions/main.py stocks_job
  # 交易時段每 1 分鐘），此 workflow 僅保留手動觸發作為備援。
  workflow_dispatch:
    inputs:
      reason:
        description: '手動觸發原因'
        required: false
        default: 'manual test'

# 不需要寫入 repository，只讀 checkout
permissions:
  contents: read

# 避免排程重疊執行（前一次還在跑時，新觸發排隊等候而不並行）
concurrency:
  group: update-stocks
  cancel-in-progress: false

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: functions/requirements.txt

      # 統一使用 functions/requirements.txt（固定版本），避免安裝未鎖版套件
      - name: Install dependencies
        run: pip install -r functions/requirements.txt

      - name: Update stock prices
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FETCH_MODE: stocks_only
        run: |
          python functions/fetch_news.py
